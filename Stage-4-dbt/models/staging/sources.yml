@"
version: 2

sources:
  - name: raw
    description: Raw data from Spark streaming jobs
    database: ecommerce_db
    schema: public
    tables:
      - name: orders
        description: Raw order events from Kafka
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - unique
              - not_null
          - name: customer_id
            description: Customer identifier
            tests:
              - not_null
          - name: total_amount
            description: Order total amount
            tests:
              - not_null
          - name: order_timestamp
            description: Order creation timestamp
            tests:
              - not_null
"@ | Out-File -FilePath "models/staging/sources.yml" -Encoding utf8